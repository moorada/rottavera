<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pratica – Patente nautica</title>
<style>
  *,*::before,*::after{box-sizing:border-box}
  body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f4f8;color:#1a1a2e;margin:0;padding:0;min-height:100vh}
  header{background:#0d3b6e;color:white;padding:10px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
  .back-link{color:rgba(255,255,255,.85);text-decoration:none;font-size:.9em;white-space:nowrap}
  .back-link:hover{color:white}
  .header-title{flex:1;font-size:1em;font-weight:700}
  .header-meta{font-size:.8em;opacity:.8;white-space:nowrap}
  main{max-width:680px;margin:0 auto;padding:20px 16px 80px}
  .filter-card{background:white;border:1px solid #c5d8ee;border-radius:10px;padding:14px 16px;margin-bottom:14px}
  .filter-row{display:flex;flex-wrap:wrap;gap:7px;align-items:center}
  .filter-row + .filter-row{margin-top:10px;padding-top:10px;border-top:1px solid #e8f0fa}
  .filter-label{font-size:.78em;color:#556;font-weight:700;white-space:nowrap;margin-right:2px}
  .filter-btn{padding:5px 11px;border-radius:16px;border:1.5px solid #c5d8ee;background:white;font-size:.78em;cursor:pointer;color:#0d3b6e;font-weight:600;transition:.15s}
  .filter-btn:hover{border-color:#0d3b6e}
  .filter-btn.active{background:#0d3b6e;color:white;border-color:#0d3b6e}
  .topic-btn{border-color:#b0cce8}
  .topic-btn.active{background:#1a5a9e}
  .progress-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .progress-text{font-size:.85em;color:#556;font-weight:600}
  .progress-bar{height:6px;border-radius:3px;background:#d0dce8;margin-bottom:20px;overflow:hidden}
  .progress-fill{height:100%;border-radius:3px;background:#0d3b6e;transition:width .3s}
  .quiz-item{background:white;border:1px solid #c5d8ee;border-radius:10px;padding:16px 18px;margin-bottom:16px}
  .quiz-item[data-last="1"]{border-left:4px solid #28a745}
  .quiz-item[data-last="0"]{border-left:4px solid #dc3545}
  .q-meta{font-size:.72em;color:#aaa;margin-bottom:6px}
  .quiz-q{font-size:.95em;line-height:1.5;margin-bottom:12px;font-weight:500}
  .ans-btn{display:block;width:100%;text-align:left;padding:9px 13px;margin-bottom:6px;border:1.5px solid #c5d8ee;border-radius:7px;background:white;cursor:pointer;font-size:.87em;transition:.15s;line-height:1.4}
  .ans-btn:hover:not(:disabled){border-color:#0d3b6e;background:#f0f6ff}
  .ans-btn:disabled{cursor:default}
  .ans-btn.show-correct{background:#d4edda;border-color:#28a745;color:#155724;font-weight:600}
  .ans-btn.show-wrong{background:#f8d7da;border-color:#dc3545;color:#721c24}
  .ans-btn.show-neutral{background:#f5f5f5;border-color:#ddd;color:#999}
  .q-reset{float:right;background:none;border:none;color:#bbb;font-size:.75em;cursor:pointer;padding:0 2px;line-height:1}
  .q-reset:hover{color:#dc3545}
  .q-rating{display:flex;gap:5px;margin-top:10px;align-items:center}
  .rating-label{font-size:.7em;color:#888;margin-right:2px;white-space:nowrap}
  .rating-btn{background:none;border:1px solid #ccc;border-radius:50%;width:26px;height:26px;cursor:pointer;font-size:14px;display:inline-flex;align-items:center;justify-content:center;opacity:.28;padding:0;flex-shrink:0;transition:opacity .15s;line-height:1}
  .rating-btn:hover{opacity:.65}
  .rating-btn.active{opacity:1;border-color:transparent}
  .quiz-img{max-width:100%;max-height:220px;object-fit:contain;border-radius:6px;border:1px solid #e0e8f0;cursor:zoom-in;display:block;margin-bottom:10px}
  .empty-msg{background:white;border:1px solid #c5d8ee;border-radius:10px;padding:32px;text-align:center;color:#778}
  .empty-msg h2{color:#0d3b6e}
  .nav-btns{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid #c5d8ee;padding:10px 16px;display:flex;gap:10px;justify-content:center;z-index:50}
  .nav-btn{padding:9px 22px;border-radius:8px;border:none;font-size:.9em;font-weight:700;cursor:pointer;background:#0d3b6e;color:white}
  .nav-btn:hover{background:#1a5a9e}
  .nav-btn.sec{background:white;color:#0d3b6e;border:2px solid #0d3b6e}
  .nav-btn.sec:hover{background:#e8f0fa}
  .fig-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:1000;align-items:center;justify-content:center;cursor:zoom-out}
  .fig-overlay.open{display:flex}
  .fig-overlay img{max-width:92vw;max-height:90vh;border-radius:6px}
  #loading{padding:60px;text-align:center;color:#888}
  .shuffle-notice{text-align:center;font-size:.8em;color:#999;margin-bottom:16px}
  @media(max-width:520px){.filter-row{gap:5px}}
</style>
</head>
<body>
<header>
  <a class="back-link" href="statistiche.html">← Statistiche</a>
  <span class="header-title" id="header-title">Modalità Pratica</span>
  <span class="header-meta" id="header-meta"></span>
</header>

<main>
  <div id="loading">Caricamento domande...</div>
  <div id="app" style="display:none">

    <div class="filter-card">
      <div class="filter-row">
        <span class="filter-label">Mostra:</span>
        <button class="filter-btn" data-f="all">Tutte</button>
        <button class="filter-btn" data-f="unseen">Mai viste</button>
        <button class="filter-btn" data-f="wrong">Sbagliate</button>
        <button class="filter-btn" data-f="red">🔴 Difficili</button>
        <button class="filter-btn" data-f="yellow">🟡 Medie</button>
        <button class="filter-btn" data-f="green">🟢 Facili</button>
        <button class="filter-btn" data-f="red,yellow">⚠️ Difficili+Medie</button>
      </div>
      <div class="filter-row" id="topic-row">
        <span class="filter-label">Argomento:</span>
        <button class="filter-btn topic-btn active" data-t="">Tutti</button>
        <!-- populated by JS -->
      </div>
    </div>

    <div class="progress-header">
      <span class="progress-text" id="progress-text">0 / 0</span>
      <span style="font-size:.8em;color:#556" id="score-text"></span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <p class="shuffle-notice" id="shuffle-notice"></p>

    <div id="questions-list"></div>
    <div class="empty-msg" id="empty-msg" style="display:none">
      <h2>Nessuna domanda trovata</h2>
      <p>Nessuna domanda corrisponde ai filtri selezionati.</p>
      <p>Prova a studiare le schede e rispondere ad alcune domande prima!</p>
      <a href="index.html" style="color:#0d3b6e;font-weight:700">→ Vai all'indice</a>
    </div>
  </div>
</main>

<div class="nav-btns" id="nav-btns" style="display:none">
  <button class="nav-btn sec" onclick="navigate(-1)">◀ Prec</button>
  <button class="nav-btn" onclick="navigate(1)">Succ ▶</button>
</div>

<div class="fig-overlay" id="fig-overlay"><img id="fig-overlay-img" src="" alt=""></div>

<script>
function loadState(key) { try { return JSON.parse(localStorage.getItem(key)||'{}'); } catch(e){return {};} }
function saveState(key, data) { localStorage.setItem(key, JSON.stringify(data)); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

let allQuestions = [];
let filtered = [];
let currentFilter = 'all';
let currentTopic  = '';
let answered = 0, correctCount = 0;

const overlay    = document.getElementById('fig-overlay');
const overlayImg = document.getElementById('fig-overlay-img');
overlay.addEventListener('click', () => overlay.classList.remove('open'));
document.addEventListener('keydown', e => { if (e.key === 'Escape') overlay.classList.remove('open'); });

function getParam(k) { return new URLSearchParams(location.search).get(k) || ''; }

function updateUrl() {
  const url = new URL(location.href);
  url.searchParams.set('filter', currentFilter);
  if (currentTopic) url.searchParams.set('topic', currentTopic);
  else url.searchParams.delete('topic');
  history.replaceState(null, '', url);
}

function applyFilters() {
  const ans = loadState('nautica-ans');
  const rat = loadState('nautica-rat');
  const filters = currentFilter.split(',').map(x => x.trim());

  filtered = shuffle(allQuestions.filter(q => {
    if (currentTopic && q.topic !== currentTopic) return false;
    const qid     = q.id;
    const lastAns = qid ? ans[qid] : null;
    const rating  = qid ? (rat[qid] || '') : '';
    return filters.some(fi => {
      if (fi === 'all')    return true;
      if (fi === 'unseen') return lastAns == null;
      if (fi === 'wrong')  return lastAns != null && !lastAns.c;
      if (fi === 'green')  return rating === 'green';
      if (fi === 'yellow') return rating === 'yellow';
      if (fi === 'red')    return rating === 'red';
      return false;
    });
  }));

  answered = 0; correctCount = 0;
  updateUrl();
  renderAll();
}

function renderAll() {
  const list    = document.getElementById('questions-list');
  const emptyMsg = document.getElementById('empty-msg');
  const navBtns  = document.getElementById('nav-btns');

  if (!filtered.length) {
    list.innerHTML = '';
    emptyMsg.style.display = 'block';
    navBtns.style.display  = 'none';
    updateProgress();
    return;
  }

  emptyMsg.style.display = 'none';
  navBtns.style.display  = 'flex';

  const ans = loadState('nautica-ans');
  const rat = loadState('nautica-rat');

  list.innerHTML = filtered.map((q, qi) => {
    const qid     = q.id || '';
    const lastAns = qid ? ans[qid] : null;
    const lastAttr = lastAns != null ? ` data-last="${lastAns.c ? '1' : '0'}"` : '';
    const rating   = qid ? (rat[qid] || '') : '';
    const ratingHtml = qid
      ? '<div class="q-rating"><span class="rating-label">Difficoltà:</span>' +
        [['green','🟢','Facile'],['yellow','🟡','Media'],['red','🔴','Difficile']].map(([val,emoji,title]) =>
          `<button class="rating-btn${rating===val?' active':''}" data-r="${val}" data-qid="${esc(qid)}" title="${title}">${emoji}</button>`
        ).join('') + '</div>'
      : '';
    return `<div class="quiz-item" data-qi="${qi}" data-qid="${esc(qid)}"${lastAttr} id="q-${qi}">
      <div class="q-meta">${esc(q.topicLabel)} · ${esc(q.section.replace(/-/g,' '))}${qid ? `<button class="q-reset" data-qid="${esc(qid)}" title="Cancella risposta">↺ cancella</button>` : ''}</div>
      ${q.img ? `<img class="quiz-img" src="${esc(q.img)}" alt="" data-lightbox>` : ''}
      <div class="quiz-q">${esc(q.q)}</div>
      ${q.a.map((t,ai) => `<button class="ans-btn" data-ai="${ai}" data-correct="${q.c}">${esc(t)}</button>`).join('')}
      ${ratingHtml}
    </div>`;
  }).join('');

  updateProgress();

  list.querySelectorAll('.ans-btn').forEach(btn => btn.addEventListener('click', onAnswer));
  list.querySelectorAll('.rating-btn').forEach(btn => btn.addEventListener('click', onRating));
  list.querySelectorAll('.q-reset').forEach(btn => btn.addEventListener('click', onResetQuestion));
  list.querySelectorAll('img[data-lightbox]').forEach(img => {
    img.addEventListener('click', () => { overlayImg.src = img.src; overlay.classList.add('open'); });
  });

  const count = filtered.length;
  document.getElementById('shuffle-notice').textContent = count + ' domand' + (count===1?'a':'e') + ' in ordine casuale';

  const first = list.querySelector('.quiz-item');
  if (first) first.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function onAnswer(e) {
  const btn  = e.currentTarget;
  const item = btn.closest('.quiz-item');
  if (item.dataset.done) return;
  item.dataset.done = '1';
  const correct   = parseInt(btn.dataset.correct);
  const clicked   = parseInt(btn.dataset.ai);
  const isCorrect = clicked === correct;
  item.querySelectorAll('.ans-btn').forEach(b => {
    b.disabled = true;
    const ai = parseInt(b.dataset.ai);
    if (ai === correct)      b.classList.add('show-correct');
    else if (ai === clicked) b.classList.add('show-wrong');
    else                     b.classList.add('show-neutral');
  });
  answered++;
  if (isCorrect) correctCount++;
  const qid = item.dataset.qid;
  if (qid) {
    const anss = loadState('nautica-ans');
    anss[qid] = { c: isCorrect, ts: Date.now() };
    saveState('nautica-ans', anss);
    item.dataset.last = isCorrect ? '1' : '0';
  }
  updateProgress();
  setTimeout(() => {
    const next = document.getElementById('q-' + (parseInt(item.dataset.qi) + 1));
    if (next && !next.dataset.done) next.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 600);
}

function onResetQuestion(e) {
  const btn  = e.currentTarget;
  const qid  = btn.dataset.qid;
  const item = btn.closest('.quiz-item');
  // Clear from localStorage
  const anss = loadState('nautica-ans');
  delete anss[qid];
  saveState('nautica-ans', anss);
  // Reset item UI
  delete item.dataset.done;
  delete item.dataset.last;
  item.querySelectorAll('.ans-btn').forEach(b => {
    b.disabled = false;
    b.classList.remove('show-correct','show-wrong','show-neutral');
    b.addEventListener('click', onAnswer);
  });
  // Update counters (rough: re-count from DOM)
  answered = document.querySelectorAll('.quiz-item[data-done]').length;
  correctCount = [...document.querySelectorAll('.quiz-item[data-done]')].filter(it => it.dataset.last === '1').length;
  updateProgress();
}

function onRating(e) {
  const btn  = e.currentTarget;
  const qid  = btn.dataset.qid;
  const r    = btn.dataset.r;
  const rats = loadState('nautica-rat');
  if (rats[qid] === r) delete rats[qid];
  else rats[qid] = r;
  saveState('nautica-rat', rats);
  btn.closest('.quiz-item').querySelectorAll('.rating-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.r === rats[qid]);
  });
}

function updateProgress() {
  const total = filtered.length;
  const pct   = total ? Math.round(answered / total * 100) : 0;
  document.getElementById('progress-text').textContent = answered + ' / ' + total + ' risposte';
  document.getElementById('score-text').textContent = answered ? '✅ ' + correctCount + '  ❌ ' + (answered - correctCount) : '';
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('header-meta').textContent = answered + '/' + total;
}

function navigate(dir) {
  const items = [...document.querySelectorAll('.quiz-item')];
  if (!items.length) return;
  const unanswered = items.filter(it => !it.dataset.done);
  const target = unanswered.length
    ? (dir > 0 ? unanswered[0] : unanswered[unanswered.length-1])
    : (dir > 0 ? items[0] : items[items.length-1]);
  target.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

const FILTER_LABELS = {
  all:        'Tutte le domande',
  unseen:     'Mai viste',
  wrong:      'Sbagliate',
  green:      '🟢 Facili',
  yellow:     '🟡 Medie',
  red:        '🔴 Difficili',
  'red,yellow': '⚠️ Difficili + Medie',
};

function buildTitle() {
  const fl = FILTER_LABELS[currentFilter] || currentFilter;
  if (!currentTopic) return fl;
  const tBtn = document.querySelector(`.topic-btn[data-t="${currentTopic}"]`);
  const tLabel = tBtn ? tBtn.textContent : currentTopic;
  return fl + ' · ' + tLabel;
}

async function init() {
  let data;
  try {
    const resp = await fetch('questions_index.json');
    data = await resp.json();
  } catch(e) {
    document.getElementById('loading').innerHTML = '<p style="color:#c00;text-align:center">Errore: impossibile caricare questions_index.json.</p>';
    return;
  }

  allQuestions = data.questions;

  // Build topic buttons from available topics
  const topicsMap = {};
  for (const q of allQuestions) {
    if (!topicsMap[q.topic]) topicsMap[q.topic] = q.topicLabel;
  }
  const topicRow = document.getElementById('topic-row');
  Object.entries(topicsMap).forEach(([id, label]) => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn topic-btn';
    btn.dataset.t = id;
    btn.textContent = label;
    btn.addEventListener('click', () => setTopic(id));
    topicRow.appendChild(btn);
  });

  // Wire difficulty filter buttons
  document.querySelectorAll('.filter-btn[data-f]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn[data-f]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.f;
      document.getElementById('header-title').textContent = buildTitle();
      applyFilters();
    });
  });

  // Wire "Tutti" topic button
  topicRow.querySelector('[data-t=""]').addEventListener('click', () => setTopic(''));

  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'block';

  // Read URL params
  currentFilter = getParam('filter') || 'all';
  currentTopic  = getParam('topic') || '';

  // Activate the right buttons
  const fBtn = document.querySelector(`.filter-btn[data-f="${currentFilter}"]`);
  if (fBtn) { document.querySelectorAll('.filter-btn[data-f]').forEach(b=>b.classList.remove('active')); fBtn.classList.add('active'); }

  if (currentTopic) setTopicUI(currentTopic);

  document.getElementById('header-title').textContent = buildTitle();
  applyFilters();
}

function setTopic(id) {
  currentTopic = id;
  setTopicUI(id);
  document.getElementById('header-title').textContent = buildTitle();
  applyFilters();
}

function setTopicUI(id) {
  document.querySelectorAll('.topic-btn').forEach(b => b.classList.toggle('active', b.dataset.t === id));
}

init();
</script>
</body>
</html>
